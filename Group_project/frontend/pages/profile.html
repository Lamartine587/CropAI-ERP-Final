<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard">

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <header class="top-bar">
            <div class="menu-toggle" id="toggleBtn"><i class="fas fa-bars"></i></div>
            <h2>Account Settings</h2>
        </header>

        <div class="content">
            <div class="auth-card" style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div id="profile-initials" style="width: 80px; height: 80px; background: #2ecc71; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2rem; font-weight: 700;">
                        ??
                    </div>
                    <h2 id="display-name" style="margin: 0; color: #2c3e50;">Loading...</h2>
                    <p id="display-email" style="color: #7f8c8d; font-size: 0.9rem;"></p>
                </div>

                <form id="profile-form">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Full Name</label>
                        <input type="text" id="profile-name" required class="form-input" style="width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px;">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem;">
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Phone Number</label>
                            <input type="text" id="profile-phone" placeholder="0712345678" class="form-input" style="width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Farm Location</label>
                            <input type="text" id="profile-location" placeholder="e.g. Kakamega" class="form-input" style="width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px;">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; font-weight: 700;">
                        Update Profile Info
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/navigation.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
