<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware | CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard">

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <header class="top-bar">
            <div class="menu-toggle" id="toggleBtn"><i class="fas fa-bars"></i></div>
            <div class="top-bar-actions">
                <span class="auth-only" id="authStatus"><i class="fas fa-check-circle"></i> Connected</span>
            </div>
        </header>

        <div class="content">
            <div class="welcome-section">
                <h1>Hardware Inventory</h1>
                <p>Manage your ESP32 IoT nodes and field sensors.</p>
            </div>

            <div class="sensor-grid">
                <div class="sensor-card">
                    <h3>Active Nodes</h3>
                    <div class="sensor-value" id="active-count">1</div>
                </div>
            </div>

            <div class="detection-section" style="margin-top: 2rem;">
                <h2>Device List</h2>
                <div class="alert-item" style="border-left: 4px solid #2ecc71; background: rgba(46, 204, 113, 0.05); padding: 20px; border-radius: 12px; margin-top: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h4 style="margin: 0;">ESP32-Node-01 (Main Field)</h4>
                            <p style="margin: 5px 0 0; font-size: 0.9rem; opacity: 0.8;">Last heartbeat: Just now</p>
                        </div>
                        <span style="color: #2ecc71; font-weight: 600;"><i class="fas fa-signal"></i> Online</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/navigation.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
