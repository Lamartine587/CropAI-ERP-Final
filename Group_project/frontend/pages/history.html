<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Table-to-Card Responsive CSS */
        @media (max-width: 768px) {
            .history-table thead { display: none; }
            .history-table tr { display: block; background: var(--card-bg); margin-bottom: 1rem; padding: 10px; border-radius: 10px; }
            .history-table td { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 8px 0; }
            .history-table td::before { content: attr(data-label); font-weight: 600; color: var(--primary-color); }
        }
    </style>
</head>
<body class="dashboard">

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <header class="top-bar">
            <div class="menu-toggle" id="toggleBtn"><i class="fas fa-bars"></i></div>
            <h2>Diagnostic History</h2>
        </header>

        <div class="content">
            <div class="sensor-card" style="padding: 0; overflow: hidden;">
                <table class="history-table" style="width: 100%;">
                    <thead>
                        <tr style="background: rgba(0,0,0,0.02);">
                            <th style="padding: 1rem; text-align: left;">Date</th>
                            <th style="padding: 1rem; text-align: left;">Crop</th>
                            <th style="padding: 1rem; text-align: left;">Diagnosis</th>
                            <th style="padding: 1rem; text-align: left;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
                <div id="noHistory" style="display:none; text-align:center; padding: 3rem;">No records found.</div>
            </div>
        </div>
    </main>

    <script src="../js/navigation.js"></script>
    <script src="../js/history.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
