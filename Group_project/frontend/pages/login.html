<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CropAI Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        /* Additional styling that won't interfere with existing classes */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .auth-container {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            min-height: calc(100vh - 80px) !important;
            padding: 2rem !important;
        }

        .auth-card {
            background: white !important;
            padding: 3rem !important;
            border-radius: 30px !important;
            width: 100% !important;
            max-width: 460px !important;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15) !important;
            border: none !important;
        }

        .auth-icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #2ecc71;
            border-radius: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }

        .auth-title {
            color: #2c3e50;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-subtitle-new {
            color: #7f8c8d;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .input-wrapper-new {
            position: relative;
        }

        .input-icon-new {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #bdc3c7;
            font-size: 1rem;
            z-index: 1;
        }

        .input-field-new {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            outline: none;
            background: #fafbfc;
            box-sizing: border-box;
        }

        .input-field-new:focus {
            border-color: #2ecc71;
            background: white;
        }

        .input-field-new:focus + .input-icon-new {
            color: #2ecc71;
        }

        .label-row-new {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.6rem;
        }

        .forgot-link-new {
            font-size: 0.75rem;
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link-new:hover {
            color: #27ae60;
            text-decoration: underline;
        }

        .password-toggle-new {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1rem;
            z-index: 10;
            padding: 5px;
        }
        
        .password-toggle-new:hover {
            color: #2ecc71;
        }

        .login-btn-new {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .login-btn-new:hover {
            background: linear-gradient(135deg, #27ae60, #229954);
        }

        .login-btn-new:hover i {
            transform: translateX(5px);
        }

        .register-section-new {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px dashed #e2e8f0;
        }

        .register-section-new p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .register-link-new {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
        }

        .register-link-new:hover {
            color: #27ae60;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem !important;
            }
            .auth-title {
                font-size: 1.5rem !important;
            }
        }
    </style>
</head>
<body>

    <main class="auth-container">
        
        <div class="auth-card">
            
            <div class="auth-icon-wrapper">
                <i class="fas fa-lock"></i>
            </div>

            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle-new">Farmer Portal • Secure Access</p>

            <form id="login-form">

                <div>
                    <label class="form-label" style="display: block; margin-bottom: 0.6rem; color: #34495e; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Email Address</label>
                    <div class="input-wrapper-new">
                        <i class="fas fa-envelope input-icon-new"></i>
                        <input type="email" id="login-email" class="input-field-new" placeholder="example@gmail.com" required>
                    </div>
                </div>
                
                <div style="margin-top: 1.5rem;">
                    <div class="label-row-new">
                        <label class="form-label" style="color: #34495e; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
                        <a href="#" class="forgot-link-new">Forgot?</a>
                    </div>
                    <div class="input-wrapper-new">
                        <i class="fas fa-key input-icon-new"></i>
                        <input type="password" id="login-password" class="input-field-new" placeholder="Password" required>
                        <span class="password-toggle-new" onclick="togglePasswordVisibility('login-password', this)">
                            <i class="far fa-eye-slash"></i>
                        </span>
                    </div>
                    <br><br>
                </div>

                <button type="submit" class="login-btn-new">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="register-section-new">
                <p>
                    <i class="fas fa-seedling" style="color: #2ecc71;"></i>
                    New to CropAI?
                    <a href="register.html" class="register-link-new">Create an Account</a>
                </p>
            </div>

        </div>
    </main>
    
    <script src="../js/auth.js"></script>
    
    <script>
        function togglePasswordVisibility(inputId, toggleIconElement) {
            const passwordInput = document.getElementById(inputId);
            const icon = toggleIconElement.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
    </script>
</body>
</html>
